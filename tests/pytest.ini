[pytest]
# Test discovery settings
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers for test categorization
markers =
    slow: marks tests as slow (API calls, model loading) - deselect with '-m "not slow"'
    api: marks tests requiring API keys (OpenAI, Together) - deselect with '-m "not api"'
    integration: marks integration tests that require external services

# Default command line options
# -v: verbose output
# --tb=short: shorter tracebacks
# -ra: show summary of all test outcomes
addopts = -v --tb=short -ra

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:langchain*

# Console output settings
console_output_style = progress

# Parallel execution settings (pytest-xdist)
# Use '-n auto' to auto-detect CPU cores
# Use '-n 4' to specify number of workers
# These are passed via CLI, not here, to allow flexibility
